name: Secret Scanning

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  simple-scan:
    name: Simple Key Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for leaked keys
        run: |
          echo "Scanning for hardcoded Groq keys or .env files..."
          
          # Check if someone accidentally committed the .env file
          if [ -f .env ]; then
            echo "::error::🚨 LEAK DETECTED: A .env file was found in the repository!"
            exit 1
          fi

          # Scan all files (except .git) for 'gsk_' which is the Groq API key prefix
          if grep -r -i "gsk_[a-zA-Z0-9]" --exclude-dir=.git .; then
            echo "::error::🚨 LEAK DETECTED: A hardcoded Groq API key (starts with 'gsk_') was found!"
            exit 1
          fi
          
          echo "✅ No leaked .env files or hardcoded Groq keys detected."
                             