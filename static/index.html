<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-powered country information agent. Ask questions about any country's population, capital, currency, and more.">
    <title>Country Info Agent — Ask About Any Country</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🌍</span>
                    <h1>Country Info Agent</h1>
                </div>
                <span class="badge">Powered by Groq + LangGraph</span>
            </div>
        </header>

        <!-- Chat area -->
        <main class="chat-area" id="chatArea">
            <!-- Welcome message -->
            <div class="welcome" id="welcome">
                <div class="welcome-icon">🗺️</div>
                <h2>Ask me anything about any country</h2>
                <p>I use real-time data from the REST Countries API, powered by Groq AI.</p>
                <div class="chips" id="chips">
                    <button class="chip" data-q="What is the population of Germany?">🇩🇪 Population of Germany?</button>
                    <button class="chip" data-q="What currency does Japan use?">🇯🇵 Currency of Japan?</button>
                    <button class="chip" data-q="What is the capital and population of Brazil?">🇧🇷 Capital & population of Brazil?</button>
                    <button class="chip" data-q="Tell me about India">🇮🇳 Tell me about India</button>
                    <button class="chip" data-q="What languages are spoken in Switzerland?">🇨🇭 Languages of Switzerland?</button>
                    <button class="chip" data-q="What are the bordering countries of France?">🇫🇷 Borders of France?</button>
                </div>
            </div>

            <!-- Messages container -->
            <div class="messages" id="messages"></div>
        </main>

        <!-- Input bar -->
        <footer class="input-bar">
            <div class="input-container">
                <input
                    type="text"
                    id="questionInput"
                    placeholder="Ask about any country... e.g. &quot;What is the capital of France?&quot;"
                    autocomplete="off"
                    maxlength="500"
                >
                <button id="sendBtn" title="Send">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
